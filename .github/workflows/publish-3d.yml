name: Publish Thai 3D

on:
  schedule:
    # Standard draw dates. 10:00 UTC is 17:00 Thailand, after normal publication.
    # The publisher still validates the official draw_date and polls only briefly.
    - cron: "0 10 1,16 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Smoke-test once or publish a validated result
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - publish
      expected_draw_date:
        description: Optional expected official draw date (YYYY-MM-DD)
        required: false
        type: string
        default: ""

concurrency:
  group: github-pages-deployment
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Install matching Chromium fallback
        run: python -m playwright install --with-deps chromium

      - name: Run full test suite
        run: python -m pytest -q

      - name: Select safe mode
        id: selection
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_MODE: ${{ inputs.mode }}
          MANUAL_EXPECTED_DATE: ${{ inputs.expected_draw_date }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            mode="publish"
            deploy="true"
            expected=""
            run_type="scheduled"
          else
            mode="$MANUAL_MODE"
            expected="$MANUAL_EXPECTED_DATE"
            run_type="manual"
            [[ "$mode" == "publish" ]] && deploy="true" || deploy="false"
          fi
          if [[ -n "$expected" && ! "$expected" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "expected_draw_date must use YYYY-MM-DD" >&2
            exit 1
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "expected=$expected" >> "$GITHUB_OUTPUT"
          {
            echo "### Thai 3D publication"
            echo "- Run type: $run_type"
            echo "- Selected mode: $mode"
            echo "- Expected draw date: ${expected:-standard schedule}"
            echo "- Deploy production files: $deploy"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke-test official result
        if: steps.selection.outputs.mode == 'smoke'
        env:
          HEADLESS: "true"
        run: python three_d_publisher.py --once

      - name: Prepare complete Pages artifact
        if: steps.selection.outputs.deploy == 'true'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/three-d-pages"
          cp -R public/. "$RUNNER_TEMP/three-d-pages/"

      - name: Poll and build production 3D JSON
        if: steps.selection.outputs.deploy == 'true'
        shell: bash
        env:
          HEADLESS: "true"
          THREE_D_POLL_INTERVAL_SECONDS: "60"
          THREE_D_POLL_WINDOW_SECONDS: "1800"
          EXPECTED_DRAW_DATE: ${{ steps.selection.outputs.expected }}
        run: |
          args=(--publish --poll --preserve-current-pages --output-dir "$RUNNER_TEMP/three-d-pages")
          if [[ -n "$EXPECTED_DRAW_DATE" ]]; then
            args+=(--expected-draw-date "$EXPECTED_DRAW_DATE")
          fi
          python three_d_publisher.py "${args[@]}"

      - name: Configure GitHub Pages
        if: steps.selection.outputs.deploy == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload complete public directory
        if: steps.selection.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/three-d-pages

      - name: Deploy GitHub Pages
        if: steps.selection.outputs.deploy == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
