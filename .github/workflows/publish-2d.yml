name: Publish Myanmar 2D

on:
  schedule:
    # Asia/Yangon is UTC+06:30. Run slightly before each result window.
    - cron: "28 5 * * 1-5"  # 11:58 Yangon
    - cron: "57 9 * * 1-5"  # 16:27 Yangon
  workflow_dispatch:
    inputs:
      session:
        description: Result session to publish
        required: true
        type: choice
        default: morning
        options:
          - morning
          - evening
      mode:
        description: Smoke test once or poll for a production result
        required: true
        type: choice
        default: once
        options:
          - once
          - poll
      publish_production:
        description: Allow a manual poll run to deploy production files
        required: true
        type: boolean
        default: false

concurrency:
  group: github-pages-2d-publisher
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Install matching Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run full test suite
        run: python -m pytest -q

      - name: Select result session and mode
        id: selection
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_SESSION: ${{ inputs.session }}
          MANUAL_MODE: ${{ inputs.mode }}
          MANUAL_PUBLISH_PRODUCTION: ${{ inputs.publish_production }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            session="$MANUAL_SESSION"
            mode="$MANUAL_MODE"
            run_type="manual"
            if [[ "$mode" == "poll" && "$MANUAL_PUBLISH_PRODUCTION" == "true" ]]; then
              deploy_production="true"
            else
              deploy_production="false"
            fi
          elif [[ "$SCHEDULE" == "28 5 * * 1-5" ]]; then
            session="morning"
            mode="poll"
            run_type="scheduled"
            deploy_production="true"
          elif [[ "$SCHEDULE" == "57 9 * * 1-5" ]]; then
            session="evening"
            mode="poll"
            run_type="scheduled"
            deploy_production="true"
          else
            echo "Unknown trigger" >&2
            exit 1
          fi
          if [[ "$run_type" == "manual" && "$mode" == "poll" && "$deploy_production" != "true" ]]; then
            echo "Manual poll mode requires publish_production=true" >&2
            exit 1
          fi
          echo "session=$session" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "run_type=$run_type" >> "$GITHUB_OUTPUT"
          echo "deploy_production=$deploy_production" >> "$GITHUB_OUTPUT"

          {
            echo "### Myanmar 2D publication"
            echo "- Selected session: $session"
            echo "- Selected mode: $mode"
            echo "- Run type: $run_type"
            echo "- Deploy production files: $deploy_production"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect and build static JSON
        shell: bash
        env:
          HEADLESS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          SELECTED_SESSION: ${{ steps.selection.outputs.session }}
          SELECTED_MODE: ${{ steps.selection.outputs.mode }}
          EXPECTED_SESSION: ${{ steps.selection.outputs.session }}
        run: |
          if [[ "$SELECTED_MODE" == "once" ]]; then
            python github_publisher.py --window "$SELECTED_SESSION" --once \
              --artifact-path "$RUNNER_TEMP/smoke-result.json"
          else
            python github_publisher.py --window "$SELECTED_SESSION"
          fi

      - name: Configure GitHub Pages
        if: >-
          steps.selection.outputs.deploy_production == 'true' &&
          (github.event_name == 'schedule' || inputs.publish_production == true)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload public directory only
        if: >-
          steps.selection.outputs.deploy_production == 'true' &&
          (github.event_name == 'schedule' || inputs.publish_production == true)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: >-
          steps.selection.outputs.deploy_production == 'true' &&
          (github.event_name == 'schedule' || inputs.publish_production == true)
        id: deployment
        uses: actions/deploy-pages@v4
