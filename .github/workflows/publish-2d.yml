name: Publish Myanmar 2D

on:
  schedule:
    # Start early enough for runner setup; the publisher waits until the strict target.
    - cron: "20 5 * * 1-5"  # 11:50 Yangon
    - cron: "50 9 * * 1-5"  # 16:20 Yangon
  workflow_dispatch:
    inputs:
      session:
        description: Result session to publish
        required: true
        type: choice
        default: morning
        options:
          - morning
          - evening
      mode:
        description: Smoke test once or explicitly publish a production result
        required: true
        type: choice
        default: once
        options:
          - once
          - publish
      publish_production:
        description: Allow a manual poll run to deploy production files
        required: true
        type: boolean
        default: false

concurrency:
  group: github-pages-deployment
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Install matching Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run full test suite
        run: python -m pytest -q

      - name: Select result session and mode
        id: selection
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_SESSION: ${{ inputs.session }}
          MANUAL_MODE: ${{ inputs.mode }}
          MANUAL_PUBLISH_PRODUCTION: ${{ inputs.publish_production }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            session="$MANUAL_SESSION"
            mode="$MANUAL_MODE"
            run_type="manual"
            if [[ "$mode" == "publish" && "$MANUAL_PUBLISH_PRODUCTION" == "true" ]]; then
              deploy_production="true"
            elif [[ "$mode" == "once" ]]; then
              deploy_production="false"
            else
              echo "Manual publish mode requires publish_production=true" >&2
              exit 1
            fi
          elif [[ "$SCHEDULE" == "20 5 * * 1-5" ]]; then
            session="morning"
            mode="publish"
            run_type="scheduled"
            deploy_production="true"
          elif [[ "$SCHEDULE" == "50 9 * * 1-5" ]]; then
            session="evening"
            mode="publish"
            run_type="scheduled"
            deploy_production="true"
          else
            echo "Unknown trigger" >&2
            exit 1
          fi
          if [[ "$mode" != "once" && "$mode" != "publish" ]]; then
            echo "Unknown mode: $mode" >&2
            exit 1
          fi
          echo "session=$session" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "run_type=$run_type" >> "$GITHUB_OUTPUT"
          echo "deploy_production=$deploy_production" >> "$GITHUB_OUTPUT"

          {
            echo "### Myanmar 2D publication"
            echo "- Selected session: $session"
            echo "- Selected mode: $mode"
            echo "- Run type: $run_type"
            echo "- Deploy production files: $deploy_production"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print workflow diagnostics
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          SELECTED_SESSION: ${{ steps.selection.outputs.session }}
          SELECTED_MODE: ${{ steps.selection.outputs.mode }}
        run: |
          utc_start="$(date -u --iso-8601=seconds)"
          yangon_start="$(TZ=Asia/Yangon date --iso-8601=seconds)"
          echo "github.event_name=$EVENT_NAME"
          echo "github.event.schedule=$EVENT_SCHEDULE"
          echo "selected_session=$SELECTED_SESSION"
          echo "selected_mode=$SELECTED_MODE"
          echo "utc_start_time=$utc_start"
          echo "yangon_start_time=$yangon_start"
          {
            echo "### Workflow diagnostics"
            echo "- github.event_name: $EVENT_NAME"
            echo "- github.event.schedule: ${EVENT_SCHEDULE:-manual}"
            echo "- Selected session: $SELECTED_SESSION"
            echo "- Selected mode: $SELECTED_MODE"
            echo "- UTC start time: $utc_start"
            echo "- Yangon start time: $yangon_start"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect and build static JSON
        id: collection
        shell: bash
        env:
          HEADLESS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          SELECTED_SESSION: ${{ steps.selection.outputs.session }}
          SELECTED_MODE: ${{ steps.selection.outputs.mode }}
          EXPECTED_SESSION: ${{ steps.selection.outputs.session }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
          PRODUCTION_SUCCESS_MARKER: ${{ runner.temp }}/production-published.json
        run: |
          echo "SELECTED_SESSION=$SELECTED_SESSION"
          echo "SELECTED_MODE=$SELECTED_MODE"
          if [[ "$SELECTED_MODE" == "once" ]]; then
            python github_publisher.py \
              --window "$SELECTED_SESSION" \
              --once
            echo "production_published=false" >> "$GITHUB_OUTPUT"
          elif [[ "$SELECTED_MODE" == "publish" ]]; then
            rm -f "$PRODUCTION_SUCCESS_MARKER"
            python github_publisher.py \
              --window "$SELECTED_SESSION" \
              --publish-production
            test -s "$PRODUCTION_SUCCESS_MARKER"
            python -c "import json,sys; value=json.load(open(sys.argv[1], encoding='utf-8')); assert value.get('production_published') is True" "$PRODUCTION_SUCCESS_MARKER"
            echo "production_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown mode: $SELECTED_MODE" >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        if: >-
          success() &&
          steps.selection.outputs.mode == 'publish' &&
          steps.collection.outputs.production_published == 'true' &&
          steps.selection.outputs.deploy_production == 'true' &&
          (github.event_name == 'schedule' || inputs.publish_production == true)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload public directory only
        if: >-
          success() &&
          steps.selection.outputs.mode == 'publish' &&
          steps.collection.outputs.production_published == 'true' &&
          steps.selection.outputs.deploy_production == 'true' &&
          (github.event_name == 'schedule' || inputs.publish_production == true)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: >-
          success() &&
          steps.selection.outputs.mode == 'publish' &&
          steps.collection.outputs.production_published == 'true' &&
          steps.selection.outputs.deploy_production == 'true' &&
          (github.event_name == 'schedule' || inputs.publish_production == true)
        id: deployment
        uses: actions/deploy-pages@v4
