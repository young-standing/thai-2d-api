name: Publish Myanmar 2D

on:
  schedule:
    # Asia/Yangon is UTC+06:30. Run slightly before each result window.
    - cron: "28 5 * * 1-5"  # 11:58 Yangon
    - cron: "57 9 * * 1-5"  # 16:27 Yangon
  workflow_dispatch:
    inputs:
      session:
        description: Result session to publish
        required: true
        type: choice
        default: morning
        options:
          - morning
          - evening
      mode:
        description: Publish once or poll for a new result
        required: true
        type: choice
        default: once
        options:
          - once
          - poll

concurrency:
  group: github-pages-2d-publisher
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Install matching Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run full test suite
        run: python -m pytest -q

      - name: Select result session and mode
        id: selection
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_SESSION: ${{ inputs.session }}
          MANUAL_MODE: ${{ inputs.mode }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            session="$MANUAL_SESSION"
            mode="$MANUAL_MODE"
            run_type="manual"
          elif [[ "$SCHEDULE" == "28 5 * * 1-5" ]]; then
            session="morning"
            mode="poll"
            run_type="scheduled"
          elif [[ "$SCHEDULE" == "57 9 * * 1-5" ]]; then
            session="evening"
            mode="poll"
            run_type="scheduled"
          else
            echo "Unknown trigger" >&2
            exit 1
          fi
          echo "session=$session" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "run_type=$run_type" >> "$GITHUB_OUTPUT"

          {
            echo "### Myanmar 2D publication"
            echo "- Selected session: $session"
            echo "- Selected mode: $mode"
            echo "- Run type: $run_type"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect and build static JSON
        shell: bash
        env:
          HEADLESS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          SELECTED_SESSION: ${{ steps.selection.outputs.session }}
          SELECTED_MODE: ${{ steps.selection.outputs.mode }}
        run: |
          if [[ "$SELECTED_MODE" == "once" ]]; then
            python github_publisher.py --window "$SELECTED_SESSION" --once
          else
            python github_publisher.py --window "$SELECTED_SESSION"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with: 
          enablement: true

      - name: Upload public directory only
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
