name: Create daily YouTube Short

on:
  schedule:
    - cron: "7 19 * * *"
      timezone: "Asia/Yangon"
  workflow_dispatch:
    inputs:
      quote:
        description: "Optional original English quote override"
        required: false
        type: string
      pexels_search:
        description: "Optional Pexels video search phrase"
        required: false
        type: string
      privacy_status:
        description: "YouTube privacy status"
        required: true
        default: private
        type: choice
        options:
          - private
          - unlisted
          - public

permissions:
  contents: write

concurrency:
  group: youtube-shorts-render-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-short:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      CHANNEL_NAME: ${{ vars.CHANNEL_NAME }}
      INPUT_QUOTE: ${{ github.event_name == 'workflow_dispatch' && inputs.quote || '' }}
      INPUT_PEXELS_SEARCH: ${{ github.event_name == 'workflow_dispatch' && inputs.pexels_search || '' }}
      INPUT_PRIVACY_STATUS: ${{ github.event_name == 'workflow_dispatch' && inputs.privacy_status || 'private' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install FFmpeg, font, and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate automation configuration
        run: python -m scripts.validate_config --require-youtube

      - name: Render 20-second Short
        id: render
        run: python -m scripts.render_short

      - name: Upload to YouTube
        id: youtube
        run: python -m scripts.upload_youtube

      - name: Persist quote usage state safely
        if: ${{ always() && steps.render.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          snapshot="$RUNNER_TEMP/rendered-state.json"
          cp data/state.json "$snapshot"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git checkout -B shorts-state-update "origin/$GITHUB_REF_NAME"
            python -m scripts.merge_state data/state.json "$snapshot" --output data/state.json

            if git diff --quiet -- data/state.json; then
              echo "No quote state change to persist."
              exit 0
            fi

            git add data/state.json
            git commit -m "Update YouTube Shorts quote state [skip ci]"
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "Quote state persisted."
              exit 0
            fi
            echo "State push conflict on attempt $attempt; retrying with latest branch."
            sleep $((attempt * 2))
          done

          echo "Quote state could not be persisted after three attempts." >&2
          exit 1

      - name: Upload render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-short-${{ github.run_id }}
          path: |
            output/short.mp4
            output/metadata.json
          if-no-files-found: warn
          retention-days: 2

      - name: Clean temporary output
        if: always()
        run: rm -rf output

