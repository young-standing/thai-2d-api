user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;
    server_tokens off;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    limit_req_zone $binary_remote_addr zone=public_api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=per_ip:10m;

    upstream thai_2d_api {
        server api:8000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;
        autoindex off;
        client_max_body_size 1m;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data: https://fastapi.tiangolo.com; frame-ancestors 'none'" always;

        location / {
            limit_req zone=public_api burst=20 nodelay;
            limit_conn per_ip 20;
            proxy_pass http://thai_2d_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location ~* \.(?:db|sqlite|sqlite3|env)$ {
            return 404 '{"detail":"Not found"}';
        }

        error_page 404 = @not_found;
        location @not_found {
            return 404 '{"detail":"Not found"}';
        }

        error_page 429 = @rate_limited;
        location @rate_limited {
            return 429 '{"detail":"Rate limit exceeded"}';
        }

        error_page 500 502 503 504 = @server_error;
        location @server_error {
            return 503 '{"detail":"Service temporarily unavailable"}';
        }
    }
}
