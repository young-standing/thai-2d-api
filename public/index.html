<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Myanmar 2D Result</title>
  <style>
    :root { font-family: system-ui, sans-serif; color-scheme: dark; background: #10141d; color: #eef2ff; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1rem; }
    main { width: min(100%, 34rem); background: #191f2c; border: 1px solid #30394d; border-radius: 1.25rem; padding: clamp(1.25rem, 5vw, 2.5rem); box-shadow: 0 1.5rem 4rem #0006; }
    h1 { margin: 0; font-size: 1rem; color: #aab5ca; text-transform: uppercase; letter-spacing: .12em; }
    #number { font-size: clamp(5rem, 25vw, 9rem); font-weight: 800; line-height: 1; text-align: center; margin: 1.5rem 0; color: #66e3a4; font-variant-numeric: tabular-nums; }
    dl { display: grid; grid-template-columns: 1fr auto; gap: .75rem 1rem; margin: 0; }
    dt { color: #9ba7bd; } dd { margin: 0; text-align: right; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
    #status { margin: 1.5rem 0 0; padding: .75rem; border-radius: .75rem; background: #252d3d; color: #bdc8db; }
    #status.error { background: #4a2028; color: #ffd5db; }
    @media (max-width: 26rem) { dl { grid-template-columns: 1fr; } dd { text-align: left; margin-bottom: .5rem; } }
  </style>
</head>
<body>
  <main>
    <h1>Myanmar 2D Result</h1>
    <div id="number" aria-live="polite">--</div>
    <dl>
      <dt>SET index</dt><dd id="set-index">—</dd>
      <dt>Value (million Baht)</dt><dd id="value-million">—</dd>
      <dt>Session</dt><dd id="session">—</dd>
      <dt>Updated</dt><dd id="updated">—</dd>
    </dl>
    <p id="status">Loading latest result…</p>
  </main>
  <script>
    const text = (id, value) => { document.getElementById(id).textContent = value; };
    async function loadLatest() {
      const status = document.getElementById('status');
      try {
        const response = await fetch(`latest.json?t=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (typeof data.number !== 'string' || data.stale === true) throw new Error('Result is stale or unavailable');
        text('number', data.number);
        text('set-index', data.set_index);
        text('value-million', data.value_million);
        text('session', data.session);
        text('updated', data.fetched_at ? new Date(data.fetched_at).toLocaleString() : '—');
        status.textContent = 'Latest verified result';
        status.className = '';
      } catch (error) {
        status.textContent = `Latest result unavailable: ${error.message}`;
        status.className = 'error';
      }
    }
    loadLatest();
  </script>
</body>
</html>
