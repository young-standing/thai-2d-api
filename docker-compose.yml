services:
  api:
    build:
      context: .
    image: thai-2d-api:local
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      DATABASE_PATH: /var/lib/thai-2d/thai_2d.sqlite3
      STALE_AFTER_SECONDS: ${STALE_AFTER_SECONDS:-86400}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    volumes:
      - ./data:/var/lib/thai-2d:ro
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  collector:
    image: thai-2d-api:local
    build:
      context: .
    restart: unless-stopped
    init: true
    ipc: host
    command: ["collector"]
    env_file:
      - .env
    environment:
      DATABASE_PATH: /var/lib/thai-2d/thai_2d.sqlite3
      MORNING_TARGET: ${MORNING_TARGET:-12:01}
      EVENING_TARGET: ${EVENING_TARGET:-16:30}
      FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-30}
      MORNING_WINDOW_START: ${MORNING_WINDOW_START:-11:59:30}
      MORNING_WINDOW_END: ${MORNING_WINDOW_END:-12:02:00}
      EVENING_WINDOW_START: ${EVENING_WINDOW_START:-16:28:30}
      EVENING_WINDOW_END: ${EVENING_WINDOW_END:-16:32:00}
      HEADLESS: ${HEADLESS:-true}
      COLLECTOR_LOCK_FILE: /tmp/thai-2d-collector.lock
    volumes:
      - ./data:/var/lib/thai-2d
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - frontend

networks:
  backend:
    internal: true
  frontend:
